name: integration_tests

on:
  pull_request:
    paths-ignore:
      - README.md
  push:
    branches:
      - main
    paths-ignore:
      - README.md

concurrency:
  group: integration-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backup_restore_matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Image
        run: docker build -t a75g/docker-db-backup:ci .

      - name: Run Integration Matrix
        shell: bash
        run: |
          chmod +x scripts/smoke-test.sh
          IMAGE="a75g/docker-db-backup:ci" \
          NET="dbbackup-ci-net" \
          TMP_ROOT="${RUNNER_TEMP}/dbbackup-ci" \
          scripts/smoke-test.sh
